<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCHUWB-Saxophone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 自定義捲動條，讓手機版橫向選單更美觀 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 新增：淡入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 新增：左側選單點擊時的平滑效果 */
        #sub-menu button {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-emerald-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-music text-2xl text-emerald-400"></i>
                <span class="text-xl font-bold tracking-tighter">NCHU SAX</span>
            </div>
            <ul id="top-menu" class="hidden md:flex space-x-8 font-medium">
                <li><a href="#" onclick="switchCategory('workshops')" class="hover:text-emerald-400 transition">歷屆交流會</a></li>
                <li><a href="#" onclick="switchCategory('performances')" class="hover:text-emerald-400 transition">各種演出紀錄</a></li>
                <li><a href="#" onclick="switchCategory('gallery')" class="hover:text-emerald-400 transition">活動剪影</a></li>
                <li><a href="#" onclick="switchCategory('tree')" class="hover:text-emerald-400 transition">族譜</a></li>
                <li><a href="#" onclick="switchCategory('about')" class="hover:text-emerald-400 transition">關於我們</a></li>
            </ul>
            <div class="md:hidden">
                <i class="fas fa-bars text-2xl"></i>
            </div>
        </div>
    </nav>

    <div class="container mx-auto flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-64 bg-white md:bg-transparent p-4 md:pt-10 border-b md:border-none">
            <h2 id="category-title" class="text-emerald-800 font-bold mb-4 hidden md:block border-l-4 border-emerald-600 pl-2">歷屆工作坊</h2>
            <nav id="sub-menu" class="flex md:flex-col space-x-4 md:space-x-0 md:space-y-2 overflow-x-auto no-scrollbar whitespace-nowrap">
                <p class="text-gray-400 text-sm italic">載入中...</p>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10">
            <div id="content-area" class="max-w-4xl">
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-6 py-1">
                        <div class="h-2 bg-slate-200 rounded"></div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-3 gap-4">
                                <div class="h-2 bg-slate-200 rounded col-span-2"></div>
                                <div class="h-2 bg-slate-200 rounded col-span-1"></div>
                            </div>
                            <div class="h-2 bg-slate-200 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-emerald-950 text-emerald-200 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-8 mb-8">
                <a href="#" class="hover:text-white">回首頁</a>
                <div class="flex space-x-4">
                    <a href="#" class="text-xl hover:text-white"><i class="fab fa-youtube"></i></a>
                </div>
            </div>

            <p class="text-emerald-400 font-serif italic mb-4">"Saxophone connects us, music stays with us."</p>

            <div class="border-t border-emerald-800 pt-6 text-xs text-emerald-500">
                <p class="mb-2">© 2026 國立中興大學管樂團-薩克斯風分部. All Rights Reserved.</p>
                <p>本站影片版權歸表演者所有，僅供愛樂者觀賞交流。</p>
                <p class="mt-2">Developed By 俊霖</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
